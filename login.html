<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoamLab 管理后台 - 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;
  --bg2:#080d1a;
  --accent:#00f5c4;
  --accent2:#4f8fff;
  --text:#eef2ff;
  --muted:rgba(200,210,255,0.5);
  --border:rgba(79,143,255,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,var(--bg),#0a0d1f);
  color:var(--text);
  font-family:'Noto Sans SC',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2rem;
}

.login-wrap{
  position:relative;
  width:100%;max-width:420px;
}

.bg-glow{
  position:absolute;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(79,143,255,0.15),transparent 70%);
  top:-150px;right:-100px;
  pointer-events:none;
}

.login-box{
  position:relative;
  background:rgba(8,13,26,0.8);
  border:1px solid var(--border);
  border-radius:20px;
  padding:3rem 2.5rem;
  backdrop-filter:blur(24px);
}

.logo-section{
  text-align:center;margin-bottom:2.5rem;
}

.logo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:1.3rem;font-weight:700;
  margin-bottom:0.75rem;
}

.logo span{color:var(--accent)}

.subtitle{
  font-size:0.9rem;color:var(--muted);
  font-weight:400;
}

.form-group{
  margin-bottom:1.5rem;
}

.form-group label{
  display:block;margin-bottom:0.65rem;
  font-size:0.9rem;font-weight:500;
  color:var(--text);
}

.form-group input{
  width:100%;padding:0.85rem 1.25rem;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:inherit;
  font-size:0.95rem;
  transition:border-color 0.2s,background 0.2s;
}

.form-group input:focus{
  outline:none;
  border-color:var(--accent2);
  background:rgba(79,143,255,0.05);
}

.btn-login{
  width:100%;
  padding:0.9rem;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#050810;
  border:none;border-radius:10px;
  font-weight:700;font-size:1rem;
  font-family:inherit;
  cursor:pointer;
  margin-top:0.5rem;
  transition:transform 0.15s,box-shadow 0.2s;
}

.btn-login:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(79,143,255,0.3);
}

.btn-login:active{
  transform:translateY(0);
}

.remember{
  display:flex;align-items:center;gap:6px;
  font-size:0.85rem;color:var(--muted);
  margin:1.25rem 0;
}

.remember input{
  width:16px;height:16px;cursor:pointer;
}

.footer-note{
  text-align:center;
  font-size:0.75rem;color:var(--muted);
  margin-top:1.5rem;
  padding-top:1.5rem;
  border-top:1px solid var(--border);
}

.error{
  background:rgba(255,79,123,0.1);
  border:1px solid rgba(255,79,123,0.3);
  color:#ff9999;
  padding:0.75rem 1rem;
  border-radius:8px;
  font-size:0.85rem;
  margin-bottom:1.5rem;
  display:none;
}

.demo-hint{
  background:rgba(0,245,196,0.08);
  border:1px solid rgba(0,245,196,0.2);
  padding:1rem;border-radius:10px;
  font-size:0.8rem;
  color:rgba(0,245,196,0.8);
  margin-top:1.5rem;
  line-height:1.7;
}

.demo-hint strong{color:var(--accent);display:block;margin-bottom:0.5rem}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="bg-glow"></div>

  <div class="login-box">
    <div class="logo-section">
      <div class="logo">🌐 RoamLab <span>管理后台</span></div>
      <p class="subtitle">全球漫游 · 自由生长</p>
    </div>

    <div class="error" id="error-msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="email" placeholder="admin@roamlab.com" required>
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="remember">
        <input type="checkbox" id="remember" checked>
        <label for="remember" style="margin:0;cursor:pointer">记住我（30天内自动登录）</label>
      </div>

      <button type="submit" class="btn-login">进入后台管理</button>
    </form>

    <div class="demo-hint">
      <strong>演示账户</strong>
      邮箱: admin@roamlab.com<br>
      密码: roamlab2026
    </div>

    <div class="footer-note">
      版本 1.0 · 安全仅供演示 · 生产环境请添加真实认证
    </div>
  </div>
</div>

<script>
function handleLogin(event){
  event.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  
  // 演示验证（实际应该连接后端）
  if(email === 'admin@roamlab.com' && password === 'roamlab2026'){
    // 保存 token
    localStorage.setItem('admin_token', 'demo_token_' + Date.now());
    if(remember){
      localStorage.setItem('admin_remember', email);
    }
    
    // 跳转到后台
    setTimeout(() => {
      location.href = 'admin.html';
    }, 300);
  } else {
    showError('邮箱或密码错误');
    document.getElementById('password').value = '';
  }
}

function showError(msg){
  const errorEl = document.getElementById('error-msg');
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  setTimeout(() => {
    errorEl.style.display = 'none';
  }, 4000);
}

// 检查是否已登录
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('admin_token');
  if(token){
    location.href = 'admin.html';
  }
  
  // 自动填充邮箱
  const remember = localStorage.getItem('admin_remember');
  if(remember){
    document.getElementById('email').value = remember;
    document.getElementById('password').focus();
  }
});

// 后台页面检查登录
if(location.pathname.includes('admin.html')){
  const token = localStorage.getItem('admin_token');
  if(!token){
    location.href = 'login.html';
  }
}
</script>
</body>
</html>
