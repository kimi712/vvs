<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoamLab 管理后台 - 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--bg2:#111;--accent:#0071e3;--text:#f5f5f7;--muted:#a1a1a6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}

.login-box{background:var(--bg2);border:1px solid #333;border-radius:1rem;padding:3rem 2.5rem;max-width:400px;width:90%;position:relative}
.logo{text-align:center;margin-bottom:2rem;font-size:1.2rem;font-weight:700}
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;margin-bottom:0.5rem;font-weight:500;font-size:0.9rem}
.form-group input{width:100%;padding:0.75rem 1rem;background:#1a1a1a;border:1px solid #333;border-radius:0.5rem;color:var(--text);font-family:inherit;font-size:0.9rem;transition:border-color 0.2s}
.form-group input:focus{outline:none;border-color:var(--accent)}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;padding:0.9rem;border-radius:0.5rem;font-weight:600;font-size:1rem;cursor:pointer;font-family:inherit;transition:opacity 0.2s}
.btn-login:hover{opacity:0.8}
.error{background:rgba(255,79,79,0.1);border:1px solid #ff4f4f;color:#ff9999;padding:1rem;border-radius:0.5rem;margin-bottom:1.5rem;display:none;font-size:0.9rem}

.demo{background:rgba(0,113,227,0.1);border:1px solid var(--accent);padding:1rem;border-radius:0.5rem;margin-top:1.5rem;font-size:0.85rem;color:var(--muted)}
.demo strong{color:var(--accent);display:block;margin-bottom:0.5rem}
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">🌐 RoamLab 后台</div>
  <div class="error" id="error"></div>
  
  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>账号</label>
      <input type="text" id="account" placeholder="输入账号" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="输入密码" required>
    </div>
    <button type="submit" class="btn-login">进入后台</button>
  </form>
  
  <div class="demo">
    <strong>演示账号：</strong>
    账号：420735121<br>
    密码：edison777
  </div>
</div>

<script>
function doLogin(e){
  e.preventDefault();
  const account = document.getElementById('account').value;
  const password = document.getElementById('password').value;
  const error = document.getElementById('error');
  
  if(account === '420735121' && password === 'edison777'){
    localStorage.setItem('roamlab_admin_token', 'token_' + Date.now());
    location.href = 'admin.html';
  } else {
    error.textContent = '❌ 账号或密码错误';
    error.style.display = 'block';
  }
}

// 检查已登录
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('roamlab_admin_token');
  if(token){
    location.href = 'admin.html';
  }
});
</script>
</body>
</html>
